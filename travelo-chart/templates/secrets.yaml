# =============================================================================
# SECRET: travelo-db-secret
# Stores sensitive MySQL credentials as base64-encoded values.
# In production, these would be managed by a secrets manager
# (e.g., HashiCorp Vault, AWS Secrets Manager, Sealed Secrets).
#
# To regenerate values:
#   echo -n "your-value" | base64
#
# Values used here:
#   MYSQL_ROOT_PASSWORD: chaima2003  → Y2hhaW1hMjAwMw==
#   MYSQL_USER:          root        → cm9vdA==  (reusing root for simplicity)
#   MYSQL_PASSWORD:      chaima2003  → Y2hhaW1hMjAwMw==
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: travelo-db-secret

  labels:
    app.kubernetes.io/name: travelo-database
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: travelo-app
type: Opaque
data:
  # echo -n "chaima2003" | base64
  MYSQL_ROOT_PASSWORD: Y2hhaW1hMjAwMw==
  # echo -n "chaima2003" | base64
  MYSQL_PASSWORD: Y2hhaW1hMjAwMw==

---
# =============================================================================
# SECRET: travelo-backend-secret
# Stores the Spring Boot datasource credentials injected at pod startup.
# These override application.properties values without modifying the image.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: travelo-backend-secret

  labels:
    app.kubernetes.io/name: travelo-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: travelo-app
type: Opaque
data:
  # echo -n "root" | base64
  SPRING_DATASOURCE_USERNAME: cm9vdA==
  # echo -n "chaima2003" | base64
  SPRING_DATASOURCE_PASSWORD: Y2hhaW1hMjAwMw==
