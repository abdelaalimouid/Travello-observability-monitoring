apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: travelo-app
  namespace: argocd
spec:
  project: default
  source:
    # Replace with your actual GitHub repo URL
    repoURL: https://github.com/BilalZiyane1/travelo-k8s-manifests.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: travelo
  syncPolicy:
    automated:
      prune: true      # Remove resources deleted from Git
      selfHeal: true   # Fix manual changes that drift from Git
    syncOptions:
      - CreateNamespace=true
