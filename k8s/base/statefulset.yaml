# =============================================================================
# SERVICE: travelo-database (ClusterIP — Headless for StatefulSet DNS)
# A headless service (clusterIP: None) is required for StatefulSets so that
# Kubernetes creates stable DNS entries for each pod:
#   travelo-database-0.travelo-database.travelo.svc.cluster.local
# The backend connects using the short form: travelo-database:3306
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: travelo-database
  namespace: travelo
  labels:
    app.kubernetes.io/name: travelo-database
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: travelo-app
spec:
  # Headless: no virtual IP, DNS resolves directly to pod IPs
  clusterIP: None
  selector:
    app: travelo-database
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP

---
# =============================================================================
# STATEFULSET: travelo-database
# MySQL is stateful — it must retain data across pod restarts and
# maintain stable network identity. StatefulSet guarantees:
#   1. Ordered pod creation/deletion
#   2. Stable hostname (travelo-database-0)
#   3. PersistentVolumeClaim per pod via volumeClaimTemplates
#
# Note: replicas=1 for DB (single primary). For HA, use a MySQL Operator
# (e.g., MySQL Operator for Kubernetes) — covered in the Bonus section.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: travelo-database
  namespace: travelo
  labels:
    app.kubernetes.io/name: travelo-database
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: travelo-app
spec:
  serviceName: "travelo-database"   # Must match the headless Service name above
  replicas: 1
  selector:
    matchLabels:
      app: travelo-database
  template:
    metadata:
      labels:
        app: travelo-database
        app.kubernetes.io/name: travelo-database
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: travelo-app
    spec:
      # -----------------------------------------------------------------------
      # Security: run as non-root where possible. MySQL official image runs
      # as user 999 (mysql) internally — we enforce this at pod level.
      # -----------------------------------------------------------------------
      securityContext:
        fsGroup: 999           # Ensures mounted volumes are group-owned by mysql
        runAsUser: 999
        runAsNonRoot: true

      # -----------------------------------------------------------------------
      # Init container: waits for the volume to be ready and sets correct
      # permissions on /var/lib/mysql before the main container starts.
      # -----------------------------------------------------------------------
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /var/lib/mysql"]
          securityContext:
            runAsUser: 0       # root needed only for chown
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql

      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP

          # -------------------------------------------------------------------
          # Environment: non-sensitive values from ConfigMap, sensitive from Secret
          # -------------------------------------------------------------------
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: travelo-db-config
                  key: MYSQL_DATABASE
            - name: MYSQL_ROOT_HOST
              valueFrom:
                configMapKeyRef:
                  name: travelo-db-config
                  key: MYSQL_ROOT_HOST
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: travelo-db-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: travelo-db-secret
                  key: MYSQL_PASSWORD

          # -------------------------------------------------------------------
          # Resource Governance
          # Requests: minimum guaranteed resources (used for scheduling)
          # Limits:   maximum allowed (prevents noisy neighbor issues)
          # -------------------------------------------------------------------
          resources:
            requests:
              cpu: "250m"       # 0.25 vCPU guaranteed
              memory: "256Mi"
            limits:
              cpu: "1000m"      # 1 vCPU max
              memory: "1Gi"

          # -------------------------------------------------------------------
          # Probes
          # startupProbe:  gives MySQL enough time to initialize on first boot
          # livenessProbe: kills and restarts the pod if MySQL becomes unresponsive
          # readinessProbe: removes pod from Service endpoints if not ready to serve
          # -------------------------------------------------------------------
          startupProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -pcharima2003    # NOTE: in prod use a k8s secret via envFrom
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30   # 30 * 10s = 5 minutes for MySQL to initialize

          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - mysql
                - -h
                - localhost
                - -u
                - root
                - -pcharima2003
                - -e
                - "SELECT 1"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # -------------------------------------------------------------------
          # Volume mount: persistent data directory
          # -------------------------------------------------------------------
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql

  # ---------------------------------------------------------------------------
  # PersistentVolumeClaim template: Kubernetes automatically creates one PVC
  # per pod replica. The PVC survives pod deletion, ensuring data persistence.
  # Storage class "standard" works with Minikube. Change to your cloud provider's
  # storage class in production (e.g., "gp3" on AWS EKS).
  # ---------------------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
        labels:
          app.kubernetes.io/name: travelo-database
          app.kubernetes.io/part-of: travelo-app
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        storageClassName: standard    # Change to your cluster's default StorageClass
